<!DOCTYPE html>
<html>
<head>
  <title>Mini Minecraft</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(10, 20, 10);
scene.add(light);

// Ground blocks
const blocks = [];
const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshLambertMaterial({ color: 0x55aa55 });

for (let x = -10; x < 10; x++) {
  for (let z = -10; z < 10; z++) {
    const cube = new THREE.Mesh(geometry, material);
    cube.position.set(x, 0, z);
    scene.add(cube);
    blocks.push(cube);
  }
}

// Player
let velocityY = 0;
let canJump = false;

// Camera start
camera.position.set(0, 2, 5);

// Controls
const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Mouse look
let yaw = 0;
let pitch = 0;

document.body.addEventListener("mousemove", e => {
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
});

document.body.addEventListener("click", () => {
  document.body.requestPointerLock();
});

// Movement
function movePlayer() {
  const speed = 0.1;

  const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
  const right = new THREE.Vector3(forward.z, 0, -forward.x);

  if (keys["s"]) camera.position.add(forward.clone().multiplyScalar(speed));
  if (keys["w"]) camera.position.add(forward.clone().multiplyScalar(-speed));
  if (keys["a"]) camera.position.add(right.clone().multiplyScalar(-speed));
  if (keys["d"]) camera.position.add(right.clone().multiplyScalar(speed));

  // Jump
  if (keys[" "] && canJump) {
    velocityY = 0.2;
    canJump = false;
  }

  // Gravity
  velocityY -= 0.01;
  camera.position.y += velocityY;

  if (camera.position.y < 2) {
    camera.position.y = 2;
    velocityY = 0;
    canJump = true;
  }
}

// Animate
function animate() {
  requestAnimationFrame(animate);

  movePlayer();

  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
