<!DOCTYPE html>
<html>
<head>
  <title>Simple Voxel World</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lighting
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// Cube (voxel) material
const material = new THREE.MeshLambertMaterial({ color: 0x55aa55 });

// Create a flat voxel world (10x10 grid)
for (let x = 0; x < 10; x++) {
  for (let z = 0; z < 10; z++) {
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const cube = new THREE.Mesh(geometry, material);

    cube.position.set(x, 0, z);
    scene.add(cube);
  }
}

// Camera position
camera.position.set(5, 8, 12);
camera.lookAt(5, 0, 5);

// Basic controls (mouse move = rotate)
let mouseX = 0;

document.addEventListener("mousemove", (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  camera.position.x = 10 * Math.sin(mouseX);
  camera.position.z = 10 * Math.cos(mouseX);
  camera.lookAt(5, 0, 5);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
